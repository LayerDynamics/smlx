# Pytest Configuration for SMLX
# https://docs.pytest.org/en/stable/reference/customize.html

[pytest]
# Test discovery patterns
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Async test configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Command line options
addopts =
    # Show test output
    -ra
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Strict markers and config
    --strict-markers
    --strict-config
    # Coverage options (uncomment when ready)
    # --cov=smlx
    # --cov-report=term-missing
    # --cov-report=html
    # --cov-report=xml
    # Parallel execution - DISABLED for integration tests to prevent memory exhaustion
    # Integration tests with module-scoped fixtures must run sequentially
    # Use: pytest -n 2 tests/unit/ for unit tests only
    # -n auto
    # Stop on first failure (uncomment for debugging)
    # -x
    # Show slowest N tests
    --durations=10
    # Timeout protection (prevent infinite hangs)
    --timeout=60
    --timeout-method=thread

# Test markers - register custom markers here
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (may require external services)
    unit: marks tests as unit tests (fast, isolated)
    benchmark: marks tests as benchmarks (performance tests)
    eval: marks tests as evaluation tests (may require datasets)
    gpu: marks tests that require GPU/MLX acceleration
    requires_model: marks tests that require downloading models
    requires_hf: marks tests that require HuggingFace datasets library
    heavy_memory: marks tests that require significant memory (>3GB)
    streaming: marks tests that use streaming/buffering patterns (may cause resource buildup)
    asyncio: marks tests as async tests (requires pytest-asyncio)
    # Add more custom markers here as needed

# Minimum version requirement
minversion = 7.0

# Test output options
console_output_style = progress
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (used when --cov is enabled)
# [coverage:run]
# source = smlx
# omit = 
#     */tests/*
#     */resources/*
#     */__pycache__/*

# Ignore warnings (add patterns as needed)
filterwarnings =
    error
    # Ignore specific warnings here
    # ignore::DeprecationWarning
    # ignore::PendingDeprecationWarning

# Pytest plugins to load
# plugins =
#     pytest_cov
#     pytest_xdist

# Add test-specific environment variables here if needed
# env =
#     SMLX_TEST_MODE=1
